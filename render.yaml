services:
  - type: web
    name: mindflow-therapist-web
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeployTrigger: commit
    disk:
      name: mindflow-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: DATA_DIR
        value: /var/data
      - key: COOKIE_SECURE
        value: "true"
      - key: APP_ENCRYPTION_KEY
        sync: false
      - key: ADMIN_INVITE_CODE
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-6
      - key: ANTHROPIC_MAX_OUTPUT_TOKENS
        value: "4096"
      - key: ANTHROPIC_THINKING_BUDGET_TOKENS
        value: "2048"
